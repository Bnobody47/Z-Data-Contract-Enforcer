# Authored contract registry (not generated). Subscriber list is read before lineage traversal in ViolationAttributor.
subscriptions:
  # Week 3 Document Refinery → Week 4 Brownfield Cartographer
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model, fact_confidence, entities]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: aligns with ValidationRunner check week3-document-refinery-extractions.fact_confidence.range and .drift
      - field: doc_id
        reason: aligns with uniqueness + UUID checks on doc_id
      - field: extracted_facts.entity_refs
        reason: aligns with constraint week3.entity_refs.resolve_to_entities
      - field: source_path
        reason: aligns with week3-document-refinery-extractions.source_path.min_length
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:00:00Z"
    contact: week4-team@org.com

  # Week 4 lineage snapshot → Week 7 Data Contract Enforcer
  - contract_id: week4-lineage-snapshots
    subscriber_id: week7-data-contract-enforcer
    subscriber_team: week7
    fields_consumed: [nodes, edges, snapshot_id]
    breaking_fields:
      - field: edges
        reason: producer/consumer graph edges drive downstream_from_graph and attributor traversal
      - field: nodes
        reason: node metadata.path grounds git log for blame chain
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:15:00Z"
    contact: week7-team@org.com

  # Week 5 event store → Week 7 Data Contract Enforcer
  - contract_id: week5-event-records
    subscriber_id: week7-data-contract-enforcer
    subscriber_team: week7
    fields_consumed: [event_id, aggregate_id, sequence_number, occurred_at, recorded_at, event_type]
    breaking_fields:
      - field: sequence_number
        reason: aligns with constraint week5.sequence.monotonic_per_aggregate
      - field: recorded_at
        reason: aligns with week5.temporal.recorded_gte_occurred
      - field: occurred_at
        reason: pairs with recorded_at for temporal order checks
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:20:00Z"
    contact: week7-team@org.com

  # LangSmith trace_record → Week 7 (AI extensions / trace intake)
  - contract_id: langsmith-trace-records
    subscriber_id: week7-data-contract-enforcer
    subscriber_team: week7
    fields_consumed: [run_type, start_time, end_time, total_tokens, total_cost]
    breaking_fields:
      - field: run_type
        reason: routing and schema for AI observability exports
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:25:00Z"
    contact: week7-team@org.com

  # Week 2 verdict JSONL → Week 7 (LLM output schema / auditor downstream)
  - contract_id: week2-auditor-verdicts
    subscriber_id: week7-data-contract-enforcer
    subscriber_team: week7
    fields_consumed: [verdict_id, overall_verdict, scores]
    breaking_fields:
      - field: overall_verdict
        reason: aligns with AI extension output schema violation rate on verdict enum
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:30:00Z"
    contact: week7-team@org.com
