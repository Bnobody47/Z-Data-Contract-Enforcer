subscriptions:
  # Week 3 Document Refinery → Week 4 Brownfield Cartographer
  # This contract is the basis for node identity and node ranking.
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: used for node ranking; scale change (0.0–1.0 vs 0–100) breaks ordering
      - field: doc_id
        reason: primary key for node identity in lineage graph
      - field: extracted_facts.entity_refs
        reason: referenced entity IDs must resolve for graph metadata integrity
      - field: source_path
        reason: provenance and prompt construction require a non-empty source URI/path
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:00:00Z"
    contact: week4-team@org.com

  # Week 5 Event Sourcing → downstream projection consumer (modeled here as Week 7 projector)
  - contract_id: week5-event-records
    subscriber_id: week5-projections
    subscriber_team: week5
    fields_consumed: [event_id, aggregate_id, sequence_number, occurred_at, recorded_at, event_type]
    breaking_fields:
      - field: sequence_number
        reason: event ordering must be strict; gaps/duplicates break projections
      - field: recorded_at
        reason: temporal causality (recorded_at >= occurred_at) must hold for audit trails
      - field: occurred_at
        reason: paired with recorded_at for temporal causality checks
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:00:00Z"
    contact: week5-team@org.com

  # LangSmith trace_record → AI-specific consumer checks (placeholder for final week)
  - contract_id: langsmith-trace-records
    subscriber_id: week6-ai-contract-checker
    subscriber_team: week6
    fields_consumed: [run_type, start_time, end_time, total_tokens, total_cost]
    breaking_fields:
      - field: run_type
        reason: output routing depends on run_type enum
    validation_mode: AUDIT
    registered_at: "2025-01-10T09:00:00Z"
    contact: week6-ai@org.com
