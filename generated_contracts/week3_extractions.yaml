kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: "Week 3 Document Refinery \u2014 extraction records"
  version: 1.0.0
  owner: week7-team
  description: Machine-checkable contract for inter-system JSONL. Covers structural,
    statistical, and cross-field rules.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
schema:
  doc_id:
    type: string
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
    required: true
    unique: true
    description: Primary document key (UUIDv4). Must be stable for the same source
      content.
  source_path:
    type: string
    required: true
    minLength: 1
    description: Source URI or filesystem path. Empty breaks downstream provenance
      joins.
  source_hash:
    type: string
    required: true
    pattern: ^[a-f0-9]{64}$
    description: SHA-256 of source bytes. Detects silent document swaps.
  extraction_model:
    type: string
    required: true
    pattern: ^(claude|gpt)-
    description: Model family prefix. Unexpected vendor strings indicate pipeline
      misconfiguration.
  processing_time_ms:
    type: integer
    required: true
    minimum: 1
    description: Wall-clock extraction duration in ms. Zero or negative indicates
      instrumentation bugs.
  extracted_at:
    type: string
    format: date-time
    required: true
    description: ISO 8601 extraction timestamp for freshness and ordering.
  token_input:
    type: integer
    required: false
    minimum: 0
    description: Prompt/input token estimate from token_count.input.
  token_output:
    type: integer
    required: false
    minimum: 0
    description: Completion token estimate from token_count.output.
  fact_fact_id:
    type: string
    required: true
    description: Stable id for each extracted fact row.
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
    unique: true
  fact_text:
    type: string
    required: true
    description: Non-empty extracted fact text.
    minLength: 1
  fact_entity_refs:
    type: string
    required: true
    description: Profiled field fact_entity_refs.
  fact_confidence:
    type: number
    required: true
    description: "Per-fact confidence 0.0\u20131.0. Silent failure mode: rescaling\
      \ to 0\u2013100 passes type checks but breaks thresholds."
    minimum: 0.0
    maximum: 1.0
    stats:
      min: 0.611
      max: 0.976
      mean: 0.8021166666666666
      p25: 0.71
      p50: 0.81
      p75: 0.899
      p95: 0.96505
      p99: 0.9712799999999999
      stddev: 0.11301553690498002
  fact_page_ref:
    type: integer
    required: true
    description: 1-based page reference for citations.
    stats:
      min: 1.0
      max: 12.0
      mean: 6.316666666666666
      p25: 3.75
      p50: 5.5
      p75: 9.25
      p95: 12.0
      p99: 12.0
      stddev: 3.4321099240953
    minimum: 1
  fact_source_excerpt:
    type: string
    required: true
    description: Profiled field fact_source_excerpt.
constraints:
- id: week3.extracted_facts.min_items
  type: record_json
  rule: array_min_length
  path: extracted_facts
  minimum: 1
  severity: CRITICAL
  description: Each extraction record must contain at least one fact.
- id: week3.entity_refs.resolve_to_entities
  type: record_json
  rule: entity_refs_in_entities
  facts_path: extracted_facts
  entities_path: entities
  severity: CRITICAL
  description: Every entity_refs id must exist in entities[].entity_id in the same
    record.
- id: week3.entities.type_enum
  type: record_json
  rule: entity_type_enum
  entities_path: entities
  allowed:
  - PERSON
  - ORG
  - LOCATION
  - DATE
  - AMOUNT
  - OTHER
  severity: CRITICAL
  description: Entity types must match the six-value ontology.
quality:
  type: SodaChecks
  specification:
    checks for extractions:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - invalid_count(fact_confidence < 0.0 OR fact_confidence > 1.0) = 0
    - row_count > 0
lineage:
  breaking_if_changed:
  - fact_confidence
  - doc_id
  - source_hash
  - extracted_facts
  upstream: []
  downstream:
  - id: pipeline::week7-contract-enforcer
    fields_consumed:
    - doc_id
    - extracted_facts
    - entities
    - source_hash
    source: week4_lineage_snapshot
  downstream_from_graph:
  - producer_node_id: file::outputs/week3/extractions.jsonl
    consumer_node_id: pipeline::week7-contract-enforcer
    consumer_label: week7 enforcer
    consumer_path: contracts/runner.py
    relationship: CONSUMES
  lineage_snapshot_id: 67d92b89-5001-47dc-92dc-2bf4a6c0f33f
llm_annotations:
- column: doc_id
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The `doc_id` column appears to represent unique identifiers for documents,
    likely in a UUID format, indicating that each value is a distinct reference to
    a specific document.", "suggested_contract_type": "id"}

    ```'
- column: source_path
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The `source_path` column likely represents unique URLs pointing to
    specific documents, indicating their location on the web.", "suggested_contract_type":
    "id"}

    ```'
- column: source_hash
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The `source_hash` column likely represents a unique identifier for
    data sources, possibly generated by a hashing algorithm to ensure data integrity
    or uniqueness.", "suggested_contract_type": "id"}

    ```'
- column: extracted_at
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The column ''extracted_at'' likely represents a timestamp indicating
    when the data was extracted, formatted in ISO 8601 standard.", "suggested_contract_type":
    "free text"}

    ```'
- column: fact_fact_id
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The column `fact_fact_id` appears to represent unique identifiers
    for facts, likely in a database or data warehouse context, indicating that each
    value is a distinct entity.", "suggested_contract_type": "id"}

    ```'
- column: fact_text
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The column `fact_text` likely contains distinct factual statements
    or entries that represent unique pieces of information.", "suggested_contract_type":
    "enum"}

    ```'
- column: fact_entity_refs
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The column `fact_entity_refs` appears to contain lists of UUIDs representing
    unique identifiers for entities, suggesting a reference to specific records in
    another dataset.", "suggested_contract_type": "id"}

    ```'
- column: fact_source_excerpt
  llm_call_status: ok
  raw_response_excerpt: '```json

    {"summary": "The column ''fact_source_excerpt'' likely contains brief textual
    excerpts or summaries from various sources, which may vary in content and structure.",
    "suggested_contract_type": "free text"}

    ```'
