version: 2
models:
- name: week3_document_refinery_extractions
  description: Contract week3-document-refinery-extractions. Column tests map to machine-checkable
    clauses. Cross-row rules (sequence monotonicity, recorded_at >= occurred_at) are
    enforced in ValidationRunner and may be added as singular SQL tests under generated_contracts/dbt_singular_tests/.
  columns:
  - name: doc_id
    description: Primary document key (UUIDv4). Must be stable for the same source
      content.
    tests:
    - not_null
    - unique
  - name: source_path
    description: Source URI or filesystem path. Empty breaks downstream provenance
      joins.
    tests:
    - not_null
  - name: source_hash
    description: SHA-256 of source bytes. Detects silent document swaps.
    tests:
    - not_null
  - name: extraction_model
    description: Model family prefix. Unexpected vendor strings indicate pipeline
      misconfiguration.
    tests:
    - not_null
  - name: processing_time_ms
    description: Wall-clock extraction duration in ms. Zero or negative indicates
      instrumentation bugs.
    tests:
    - not_null
  - name: extracted_at
    description: ISO 8601 extraction timestamp for freshness and ordering.
    tests:
    - not_null
  - name: token_input
    description: Prompt/input token estimate from token_count.input.
    tests: []
  - name: token_output
    description: Completion token estimate from token_count.output.
    tests: []
  - name: fact_fact_id
    description: Stable id for each extracted fact row.
    tests:
    - not_null
    - unique
  - name: fact_text
    description: Non-empty extracted fact text.
    tests:
    - not_null
  - name: fact_entity_refs
    description: Profiled field fact_entity_refs.
    tests:
    - not_null
  - name: fact_confidence
    description: "Per-fact confidence 0.0\u20131.0. Silent failure mode: rescaling\
      \ to 0\u2013100 passes type checks but breaks thresholds."
    tests:
    - not_null
  - name: fact_page_ref
    description: 1-based page reference for citations.
    tests:
    - not_null
  - name: fact_source_excerpt
    description: Profiled field fact_source_excerpt.
    tests:
    - not_null
