version: 2
models:
- name: week5_event_records
  description: Contract week5-event-records. Column tests map to machine-checkable
    clauses. Cross-row rules (sequence monotonicity, recorded_at >= occurred_at) are
    enforced in ValidationRunner and may be added as singular SQL tests under generated_contracts/dbt_singular_tests/.
  columns:
  - name: event_id
    description: Immutable event identifier.
    tests:
    - not_null
    - unique
  - name: event_type
    description: PascalCase event name registered in the schema registry.
    tests:
    - not_null
  - name: aggregate_id
    description: Aggregate root id for optimistic concurrency and replay.
    tests:
    - not_null
  - name: aggregate_type
    description: Aggregate type label (PascalCase).
    tests:
    - not_null
    - accepted_values:
        values:
        - Document
        quote: true
  - name: sequence_number
    description: Monotonically increasing per aggregate_id (enforced by constraint).
    tests:
    - not_null
  - name: schema_version
    description: Semantic version string for payload upcasting.
    tests:
    - not_null
  - name: occurred_at
    description: Domain time of the fact.
    tests:
    - not_null
  - name: recorded_at
    description: Append time to the log; must not precede occurred_at.
    tests:
    - not_null
