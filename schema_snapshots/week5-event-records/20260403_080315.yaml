kind: DataContract
apiVersion: v3.0.0
id: week5-event-records
info:
  title: "Week 5 \u2014 event store records"
  version: 1.0.0
  owner: week7-team
  description: Machine-checkable contract for inter-system JSONL. Covers structural,
    statistical, and cross-field rules.
servers:
  local:
    type: local
    path: outputs\week5\events_violated_temporal_and_sequence.jsonl
    format: jsonl
schema:
  event_id:
    type: string
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
    required: true
    unique: true
    description: Immutable event identifier.
  event_type:
    type: string
    required: true
    pattern: ^[A-Z][a-zA-Z0-9]*$
    description: PascalCase event name registered in the schema registry.
  aggregate_id:
    type: string
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
    required: true
    description: Aggregate root id for optimistic concurrency and replay.
  aggregate_type:
    type: string
    required: true
    enum:
    - Document
    description: Aggregate type label (PascalCase).
  sequence_number:
    type: integer
    required: true
    minimum: 1
    description: Monotonically increasing per aggregate_id (enforced by constraint).
  schema_version:
    type: string
    required: true
    pattern: ^\d+\.\d+$
    description: Semantic version string for payload upcasting.
  occurred_at:
    type: string
    format: date-time
    required: true
    description: Domain time of the fact.
  recorded_at:
    type: string
    format: date-time
    required: true
    description: Append time to the log; must not precede occurred_at.
constraints:
- id: week5.temporal.recorded_gte_occurred
  type: record_json
  rule: timestamp_order
  early: occurred_at
  late: recorded_at
  severity: CRITICAL
  description: recorded_at must be >= occurred_at for every event.
- id: week5.sequence.monotonic_per_aggregate
  type: dataset_json
  rule: monotonic_sequence
  group_field: aggregate_id
  sequence_field: sequence_number
  strict: true
  severity: CRITICAL
  description: sequence_number must strictly increase per aggregate_id with no gaps
    or duplicates.
- id: week5.metadata.source_service
  type: record_json
  rule: metadata_string
  path: metadata.source_service
  pattern: ^week[0-9]-|^[a-z0-9-]+$
  severity: HIGH
  description: Producer service name for cross-system routing.
quality:
  type: SodaChecks
  specification:
    checks for events:
    - missing_count(event_id) = 0
    - duplicate_count(event_id) = 0
    - invalid_count(recorded_at < occurred_at) = 0
lineage:
  breaking_if_changed:
  - sequence_number
  - aggregate_id
  - event_type
  - payload
